{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Trip Package</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* Container */
.container{
    max-width: 600px;
    margin: 60px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Title */
h2{
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

/* Form Group */
.form-group{
    margin-bottom: 15px;
}

label{
    font-weight: 600;
    display: block;
    margin-bottom: 5px;
    color: #555;
}

input, textarea, select{
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

input:focus, textarea:focus{
    border-color: #4facfe;
    box-shadow: 0 0 5px rgba(79,172,254,0.5);
}

/* Button */
button{
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    transform: scale(1.05);
}

/* Back link */
.back-link{
    display: block;
    text-align: center;
    margin-top: 15px;
    text-decoration: none;
    color: #4facfe;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>Update Trip Package</h2>

    <form method="POST" action="{% url 'update_package' result.id %}" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Package Name</label>
            <input type="text" name="name" value="{{ result.name }}" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4" required>{{ result.description }}</textarea>
        </div>

        <div class="form-group">
            <label>Price</label>
            <input type="number" name="price" value="{{ result.price }}" required>
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" value="{{ result.location }}" required>
        </div>

        <div class="form-group">
            <label>Category</label>
            <input type="text" name="category" value="{{ result.category }}" required>
        </div>

        <div class="form-group">
            <label>Duration (Days)</label>
            <input type="text" name="duration" value="{{ result.duration }}" required>
        </div>

        <div class="form-group">
            <label>Update Image</label>
            <input type="file" name="image">
        </div>

        <button type="submit">Update Package</button>
    </form>

    <a href="{% url 'admin_package_view' %}" class="back-link">← Back to Packages</a>
</div>

</body>
</html>
